<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Kos Ropiul</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 16px;
    }
    html { scroll-behavior: smooth; }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 18px 35px rgba(15,23,42,0.18); }
    .card-title { font-size: 13px; color: #64748b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .jam-box { text-align: center; padding: 10px 0; }
    .app-title {
      text-align: center; font-size: 32px; font-weight: 700;
      color: #e2e8f0; letter-spacing: 0.22em; text-transform: uppercase;
      margin-bottom: 14px; text-shadow: 0 3px 18px rgba(226,232,240,0.14); line-height: 1.1;
    }
    .jam-angka { font-size: 56px; font-weight: 700; letter-spacing: 4px; color: white; display: flex; justify-content: center; align-items: flex-end; }
    .digit-wrapper { display: inline-block; overflow: hidden; height: 1.2em; vertical-align: bottom; }
    .digit { display: block; }
    .digit.slide-in { animation: slideUp 0.3s ease forwards; }
    @keyframes slideUp { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .sep { margin: 0 2px; line-height: 1.2em; }
    .jam-tanggal { font-size: 18px; color: #cbd5e1; margin-top: 10px; line-height: 1.4; font-weight: 500; }
    .cuaca-box { background: #0f172a; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .cuaca-left { display: flex; flex-direction: column; gap: 4px; }
    .cuaca-suhu { font-size: 48px; font-weight: 700; line-height: 1; }
    .cuaca-feels { font-size: 13px; color: #64748b; }
    .cuaca-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .cuaca-kondisi { font-size: 15px; font-weight: 600; color: #e2e8f0; text-align: right; }
    .cuaca-detail { font-size: 12px; color: #64748b; text-align: right; line-height: 1.6; }
    .cuaca-icon { font-size: 40px; line-height: 1; text-align: right; }
    .cuaca-loading { color: #64748b; font-size: 14px; text-align: center; padding: 12px 0; }
    .status-box { background: #0f172a; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #64748b; flex-shrink: 0; }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button { padding: 14px; font-size: 15px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-on { background: #22c55e; color: white; }
    .btn-off { background: #ef4444; color: white; }
    .btn-set { background: #3b82f6; color: white; grid-column: span 2; }
    .btn-nonaktif { background: #475569; color: white; grid-column: span 2; }
    .btn-matikan { background: #f59e0b; color: white; grid-column: span 2; }
    .alarm-input { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
    input[type="time"] { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px; color: white; font-size: 18px; text-align: center; }
    .alarm-status { background: #0f172a; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; font-size: 13px; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
    .alarm-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; flex-shrink: 0; }
    .alarm-dot.aktif { background: #22c55e; }
    .alarm-dot.bunyi { background: #f59e0b; }
    .sholat-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .sholat-item {
      background: #0f172a;
      border-radius: 12px;
      padding: 10px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: background 0.3s;
    }
    .sholat-item.aktif { background: #1d4ed8; box-shadow: 0 0 0 2px #3b82f6; }
    .sholat-item.berikutnya { background: #164e63; box-shadow: 0 0 0 2px #22d3ee; }
    .sholat-nama {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0;
      text-align: center;
      width: 100%;
      display: block;
    }
    .sholat-item.aktif .sholat-nama, .sholat-item.berikutnya .sholat-nama { color: #bfdbfe; }
    .sholat-waktu { font-size: 14px; font-weight: 700; color: #e2e8f0; text-align: center; width: 100%; display: block; }
    .sholat-badge { font-size: 9px; margin-top: 4px; color: #94a3b8; text-align: center; width: 100%; display: block; }
    .sholat-item.aktif .sholat-badge { color: #93c5fd; }
    .sholat-item.berikutnya .sholat-badge { color: #67e8f9; }
    .footer { font-size: 12px; color: #334155; }
    @media (max-width: 420px) {
      .app-title { font-size: 26px; letter-spacing: 0.18em; }
      .jam-angka { font-size: 50px; }
      .jam-tanggal { font-size: 16px; }
      .cuaca-suhu { font-size: 40px; }
    }
  </style>
</head>
<body>

  <div class="app-title">Asisten Ropiul</div>

  <div class="card">
    <div class="jam-box">
      <div class="jam-angka">
        <span class="digit-wrapper"><span class="digit" id="d0">-</span></span>
        <span class="digit-wrapper"><span class="digit" id="d1">-</span></span>
        <span class="sep">:</span>
        <span class="digit-wrapper"><span class="digit" id="d2">-</span></span>
        <span class="digit-wrapper"><span class="digit" id="d3">-</span></span>
        <span class="sep">:</span>
        <span class="digit-wrapper"><span class="digit" id="d4">-</span></span>
        <span class="digit-wrapper"><span class="digit" id="d5">-</span></span>
      </div>
      <div class="jam-tanggal" id="tanggal">--</div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">🌤️ Cuaca &amp; — Kota Surabaya</p>
    <div id="cuaca-content"><div class="cuaca-loading">Memuat data cuaca...</div></div>
  </div>

  <div class="card">
    <p class="card-title">🕌 Jadwal Sholat — Kota Surabaya</p>
    <div id="sholat-content"><div class="cuaca-loading">Memuat jadwal sholat...</div></div>
  </div>

  <div class="card">
    <p class="card-title">💡 Lampu</p>
    <div class="status-box">
      <div class="dot" id="dot-lampu"></div>
      <span id="status-lampu">Lampu Mati</span>
    </div>
    <div class="buttons">
      <button class="btn-on" onclick="kirimLampu('ON')" id="btn-on" disabled>ON</button>
      <button class="btn-off" onclick="kirimLampu('OFF')" id="btn-off" disabled>OFF</button>
    </div>
  </div>

  <div class="card">
    <p class="card-title">💨 Kipas</p>
    <div class="status-box">
      <div class="dot" id="dot-kipas"></div>
      <span id="status-kipas">Kipas Mati</span>
    </div>
    <div class="buttons">
      <button class="btn-on" onclick="kirimKipas('ON')" id="btn-kipas-on" disabled>ON</button>
      <button class="btn-off" onclick="kirimKipas('OFF')" id="btn-kipas-off" disabled>OFF</button>
    </div>
  </div>

  <div class="card">
    <p class="card-title">⏰ Alarm</p>
    <div class="alarm-status">
      <div class="alarm-dot" id="alarm-dot"></div>
      <span id="alarm-status-text">Alarm tidak aktif</span>
    </div>
    <div class="alarm-input">
      <input type="time" id="waktu-alarm" value="07:00">
    </div>
    <div class="buttons">
      <button class="btn-set" onclick="setAlarm()" id="btn-set" disabled>Set Alarm</button>
      <button class="btn-matikan" onclick="matikanAlarm()" id="btn-matikan" disabled>Matikan Alarm</button>
      <button class="btn-nonaktif" onclick="nonaktifkanAlarm()" id="btn-nonaktif" disabled>Nonaktifkan Alarm</button>
    </div>
  </div>

  <p class="footer">Smart Kos &copy; 2026</p>

  <script>
    function setKipasStatus(state, save) {
      const s = state === 'ON' ? 'ON' : 'OFF';
      document.getElementById('dot-kipas').className = 'dot ' + s.toLowerCase();
      document.getElementById('status-kipas').innerText = s === 'ON' ? 'Kipas Nyala' : 'Kipas Mati';
      if (save) localStorage.setItem('statusKipas', s);
    }

    function kirimLampu(state) {
      client.publish('smartkos/lampu', state);
      localStorage.setItem('statusLampu', state);
      document.getElementById('dot-lampu').className = 'dot ' + state.toLowerCase();
      document.getElementById('status-lampu').innerText = state === 'ON' ? 'Lampu Nyala' : 'Lampu Mati';
    }

    function kirimKipas(state) {
      client.publish('smartkos/kipas', state);
      setKipasStatus(state, true);
    }

    function getDateString(date) {
      return date.toISOString().slice(0, 10);
    }

    function setAlarm() {
      const waktu = document.getElementById('waktu-alarm').value;
      if (!waktu) return;
      client.publish('smartkos/alarm', waktu);
      localStorage.setItem('alarmWaktu', waktu);
      localStorage.removeItem('alarmSkipDate');
      document.getElementById('alarm-dot').className = 'alarm-dot aktif';
      document.getElementById('alarm-status-text').innerText = 'Alarm aktif: ' + waktu + ' WIB';
    }

    function matikanAlarm() {
      const today = getDateString(new Date());
      client.publish('smartkos/alarm', 'MATIKAN');
      client.publish('smartkos/kipas', 'OFF');
      setKipasStatus('OFF', true);
      localStorage.setItem('alarmSkipDate', today);
      document.getElementById('alarm-dot').className = 'alarm-dot bunyi';
      document.getElementById('alarm-status-text').innerText = 'Alarm Dimatikan';
    }

    function nonaktifkanAlarm() {
      client.publish('smartkos/alarm', 'OFF');
      client.publish('smartkos/kipas', 'OFF');
      setKipasStatus('OFF', true);
      localStorage.removeItem('alarmWaktu');
      localStorage.removeItem('alarmSkipDate');
      document.getElementById('alarm-dot').className = 'alarm-dot';
      document.getElementById('alarm-status-text').innerText = 'Alarm mati';
    }

    if (localStorage.getItem('versi') !== '2') {
      localStorage.removeItem('statusKipas');
      localStorage.setItem('versi', '2');
    }

    const savedLampu = localStorage.getItem('statusLampu');
    if (savedLampu) {
      document.getElementById('dot-lampu').className = 'dot ' + savedLampu.toLowerCase();
      document.getElementById('status-lampu').innerText = savedLampu === 'ON' ? 'Lampu Nyala' : 'Lampu Mati';
    }

    if (localStorage.getItem('statusKipas') === null) localStorage.setItem('statusKipas', 'ON');
    setKipasStatus(localStorage.getItem('statusKipas'), false);

    const savedAlarm = localStorage.getItem('alarmWaktu');
    const alarmSkipDate = localStorage.getItem('alarmSkipDate');
    const today = getDateString(new Date());

    if (savedAlarm) {
     document.getElementById('waktu-alarm').value = savedAlarm;

    if (alarmSkipDate === today) {
        document.getElementById('alarm-dot').className = 'alarm-dot bunyi';
        document.getElementById('alarm-status-text').innerText = 'Alarm dimatikan hari ini';
     } else {
        localStorage.removeItem('alarmSkipDate'); // reset otomatis besok
        document.getElementById('alarm-dot').className = 'alarm-dot aktif';
        document.getElementById('alarm-status-text').innerText = 'Alarm aktif: ' + savedAlarm + ' WIB';
     }
    }

    const broker = 'wss://276d9e54084e4a99b7b863492b06212b.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
      username: 'Rafifirdaus',
      password: '@Gresik123',
      clientId: 'webClient_' + Math.random().toString(16).substr(2, 8)
    };
    const client = mqtt.connect(broker, options);

    client.on('connect', () => {
      ['btn-on', 'btn-off', 'btn-kipas-on', 'btn-kipas-off',
       'btn-set', 'btn-matikan', 'btn-nonaktif'].forEach(id => {
        document.getElementById(id).disabled = false;
      });
      client.subscribe('smartkos/status');
    });

    client.on('message', (topic, message) => {
      if (topic === 'smartkos/status' && message.toString() === 'ALARM_BUNYI') {
        setKipasStatus('OFF', true);
      }
    });

    let prevDigits = ['', '', '', '', '', ''];
    function updateJam() {
      const now = new Date();
      const jamStr = new Intl.DateTimeFormat('id-ID', {
        timeZone: 'Asia/Jakarta',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).format(now).replace(/\./g, ':').replace(/:/g, '');
      jamStr.split('').forEach((digit, i) => {
        if (digit !== prevDigits[i]) {
          const el = document.getElementById('d' + i);
          el.classList.remove('slide-in');
          void el.offsetWidth;
          el.textContent = digit;
          el.classList.add('slide-in');
          prevDigits[i] = digit;
        }
      });
      document.getElementById('tanggal').innerText =
        new Intl.DateTimeFormat('id-ID', {
          timeZone: 'Asia/Jakarta',
          weekday: 'long', day: 'numeric', month: 'short', year: 'numeric'
        }).format(now);
    }
    setInterval(updateJam, 1000);
    updateJam();

    const WEATHER_KEY = 'fcf807bd760344b5a57124817261204';
    const CUACA_URL = 'https://api.weatherapi.com/v1/current.json?key=' + WEATHER_KEY + '&q=Surabaya&lang=id';

    function ikonCuaca(code, isDay) {
      if (code === 1000) return isDay ? '☀️' : '🌙';
      if (code === 1003) return '⛅';
      if ([1006, 1009].includes(code)) return '☁️';
      if ([1030, 1135, 1147].includes(code)) return '🌫️';
      if ([1063, 1150, 1153, 1168, 1171, 1180, 1183].includes(code)) return '🌦️';
      if ([1186, 1189, 1192, 1195, 1198, 1201, 1240, 1243, 1246].includes(code)) return '🌧️';
      if ([1087, 1273, 1276, 1279, 1282].includes(code)) return '⛈️';
      return '🌡️';
    }

    async function ambilCuaca() {
      const el = document.getElementById('cuaca-content');
      el.innerHTML = '<div class="cuaca-loading">Memuat data cuaca...</div>';
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 5000);
        const res = await fetch(CUACA_URL, { signal: ctrl.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('Gagal');
        const data = await res.json();
        const c = data.current;
        const suhu = Math.round(c.temp_c);
        const rasaSuhu = Math.round(c.feelslike_c);
        const humidity = Math.round(c.humidity);
        const angin = Math.round(c.wind_kph);
        const kondisi = c.condition.text;
        const icon = ikonCuaca(c.condition.code, c.is_day);
        let suhuWarna = '#22c55e';
        if (suhu >= 35) suhuWarna = '#ef4444';
        else if (suhu >= 30) suhuWarna = '#f97316';
        else if (suhu >= 25) suhuWarna = '#f59e0b';
        el.innerHTML = `
          <div class="cuaca-box">
            <div class="cuaca-left">
              <div class="cuaca-suhu" style="color:${suhuWarna}">${suhu}°C</div>
              <div class="cuaca-feels">Terasa ${rasaSuhu}°C</div>
            </div>
            <div class="cuaca-right">
              <div class="cuaca-icon">${icon}</div>
              <div class="cuaca-kondisi">${kondisi}</div>
              <div class="cuaca-detail">💧 Kelembapan ${humidity}%<br>💨 Angin ${angin} km/j</div>
            </div>
          </div>`;
      } catch (e) {
        el.innerHTML = '<div class="cuaca-loading" style="color:#ef4444;">Gagal memuat cuaca. Periksa koneksi.</div>';
      }
    }
    ambilCuaca();
    setInterval(ambilCuaca, 10 * 60 * 1000);

    function hitungSholat() {
      const LAT = -7.2575, LON = 112.7521, TZ = 7;
      const FAJR_ANG = 20, ISHA_ANG = 18;

      const now = new Date();
      const Y = now.getFullYear(), M = now.getMonth() + 1, D = now.getDate();

      const JD = Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + D + 2 - Math.floor(Y / 100) + Math.floor(Math.floor(Y / 100) / 4) - 1524.5;
      const T  = (JD - 2451545) / 36525;
      const L0 = (280.46646 + 36000.76983 * T) % 360;
      const M2 = (357.52911 + 35999.05029 * T - 0.0001537 * T * T) * Math.PI / 180;
      const C  = (1.914602 - 0.004817 * T) * Math.sin(M2) + 0.019993 * Math.sin(2 * M2);
      const SL = (L0 + C) * Math.PI / 180;
      const OB = (23.439291 - 0.013004 * T) * Math.PI / 180;

      const RA  = Math.atan2(Math.cos(OB) * Math.sin(SL), Math.cos(SL)) * 180 / Math.PI;
      const DEC = Math.asin(Math.sin(OB) * Math.sin(SL));
      const EQT = (L0 - 0.0057183 - RA + (125.04 - 1934.136 * T) * Math.PI / 180 * (-0.00478 * Math.sin((125.04 - 1934.136 * T) * Math.PI / 180) - 0.00417 * Math.sin(2 * L0 * Math.PI / 180))) * 4;
      const TRANSIT = 12 + TZ - LON / 15 - EQT / 60;

      function hourAngle(angle) {
        const a = angle * Math.PI / 180;
        const latR = LAT * Math.PI / 180;
        const cos_h = (Math.sin(a) - Math.sin(latR) * Math.sin(DEC)) / (Math.cos(latR) * Math.cos(DEC));
        if (cos_h < -1 || cos_h > 1) return null;
        return Math.acos(cos_h) * 180 / Math.PI / 15;
      }

      function asrHourAngle(shadow) {
        const latR = LAT * Math.PI / 180;
        const angle = Math.atan(1 / (shadow + Math.tan(Math.abs(latR - DEC))));
        const cos_h = (Math.sin(angle) - Math.sin(latR) * Math.sin(DEC)) / (Math.cos(latR) * Math.cos(DEC));
        if (cos_h < -1 || cos_h > 1) return null;
        return Math.acos(cos_h) * 180 / Math.PI / 15;
      }

      function toHHMM(dec) {
        if (dec === null) return '--:--';
        dec = ((dec % 24) + 24) % 24;
        const h = Math.floor(dec);
        const m = Math.round((dec - h) * 60);
        const hh = m === 60 ? h + 1 : h;
        const mm = m === 60 ? 0 : m;
        return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
      }

      const hFajr   = hourAngle(-FAJR_ANG);
      const hAsr    = asrHourAngle(1);
      const hSunset = hourAngle(-0.8333);
      const hIsha   = hourAngle(-ISHA_ANG);

      return [
        { nama: 'Subuh',   waktu: toHHMM(TRANSIT - hFajr) },
        { nama: 'Dzuhur',  waktu: toHHMM(TRANSIT + 0.017) },
        { nama: 'Ashar',   waktu: toHHMM(TRANSIT + hAsr) },
        { nama: 'Maghrib', waktu: toHHMM(TRANSIT + hSunset + 0.033) },
        { nama: 'Isya',    waktu: toHHMM(TRANSIT + hIsha) }
      ];
    }

    function tampilSholat() {
      const el = document.getElementById('sholat-content');
      try {
        const waktuSholat = hitungSholat();
        const now = new Date();
        const jamNow = now.toLocaleTimeString('id-ID', {
          timeZone: 'Asia/Jakarta', hour: '2-digit', minute: '2-digit', hour12: false
        }).replace('.', ':');

        let idxAktif = -1;
        for (let i = waktuSholat.length - 1; i >= 0; i--) {
          if (jamNow >= waktuSholat[i].waktu) { idxAktif = i; break; }
        }
        const idxBerikutnya = (idxAktif + 1) % waktuSholat.length;

        el.innerHTML = '<div class="sholat-grid">' +
          waktuSholat.map((s, i) => {
            let cls = 'sholat-item', badge = '';
            if (i === idxAktif)      { cls += ' aktif';      badge = '● Sekarang'; }
            if (i === idxBerikutnya) { cls += ' berikutnya'; badge = '↑ Berikutnya'; }
            return `<div class="${cls}"><div class="sholat-nama">${s.nama}</div><div class="sholat-waktu">${s.waktu}</div><div class="sholat-badge">${badge}</div></div>`;
          }).join('') + '</div>';
      } catch (e) {
        el.innerHTML = '<div class="cuaca-loading" style="color:#ef4444;">Gagal menghitung jadwal sholat.</div>';
      }
    }
    tampilSholat();
    setInterval(tampilSholat, 60 * 1000);
  </script>
</body>
</html>
