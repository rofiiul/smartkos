<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Kos Ropiul</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 16px;
    }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
    }
    .card-title {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* JAM */
    .jam-box {
      text-align: center;
      padding: 10px 0;
    }
    .jam-angka {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 4px;
      color: white;
    }
    .jam-tanggal {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }
    #mqtt-status {
      font-size: 11px;
      text-align: center;
      color: #475569;
      margin-top: 8px;
    }

    /* LAMPU */
    .status-box {
      background: #0f172a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #64748b;
      flex-shrink: 0;
    }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    #status-text { font-size: 14px; color: #cbd5e1; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-on { background: #22c55e; color: white; }
    .btn-off { background: #ef4444; color: white; }
    .btn-set { background: #3b82f6; color: white; grid-column: span 2; }
    .btn-nonaktif { background: #475569; color: white; grid-column: span 2; }
    .btn-matikan { background: #f59e0b; color: white; grid-column: span 2; }

    /* ALARM */
    .alarm-input {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }
    input[type="time"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-size: 18px;
      text-align: center;
    }
    .alarm-status {
      background: #0f172a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alarm-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .alarm-dot.aktif { background: #22c55e; }
    .alarm-dot.bunyi { background: #f59e0b; }

    .footer { font-size: 12px; color: #334155; }
  </style>
</head>
<body>

  <!-- JAM -->
  <div class="card">
    <div class="jam-box">
      <div class="jam-angka" id="jam">--:--:--</div>
      <div class="jam-tanggal" id="tanggal">--</div>
    </div>
    <p id="mqtt-status">Menghubungkan ke server...</p>
  </div>

  <!-- LAMPU -->
  <div class="card">
    <p class="card-title">💡 Kontrol Lampu</p>
    <div class="status-box">
      <div class="dot" id="dot"></div>
      <span id="status-text">Belum ada perintah</span>
    </div>
    <div class="buttons">
      <button class="btn-on" onclick="kirimLampu('ON')" id="btn-on" disabled>ON</button>
      <button class="btn-off" onclick="kirimLampu('OFF')" id="btn-off" disabled>OFF</button>
    </div>
  </div>

  <!-- ALARM -->
  <div class="card">
    <p class="card-title">⏰ Alarm</p>
    <div class="alarm-status">
      <div class="alarm-dot" id="alarm-dot"></div>
      <span id="alarm-status-text">Alarm tidak aktif</span>
    </div>
    <div class="alarm-input">
      <input type="time" id="waktu-alarm" value="07:00">
    </div>
    <div class="buttons">
      <button class="btn-set" onclick="setAlarm()" id="btn-set" disabled>Set Alarm</button>
      <button class="btn-matikan" onclick="matikanAlarm()" id="btn-matikan" disabled>Matikan Alarm</button>
      <button class="btn-nonaktif" onclick="nonaktifkanAlarm()" id="btn-nonaktif" disabled>Nonaktifkan Alarm</button>
    </div>
  </div>

  <p class="footer">Smart Kos &copy; 2026</p>

  <script>
    const broker = 'wss://276d9e54084e4a99b7b863492b06212b.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
      username: 'Rafifirdaus',
      password: '@Gresik123',
      clientId: 'webClient_' + Math.random().toString(16).substr(2, 8)
    };

    const client = mqtt.connect(broker, options);
    let alarmAktif = false;
    let alarmWaktu = '';

    client.on('connect', () => {
      document.getElementById('mqtt-status').innerText = 'Terhubung ke server ✓';
      document.getElementById('btn-on').disabled = false;
      document.getElementById('btn-off').disabled = false;
      document.getElementById('btn-set').disabled = false;
      document.getElementById('btn-matikan').disabled = false;
      document.getElementById('btn-nonaktif').disabled = false;
    });

    client.on('error', () => {
      document.getElementById('mqtt-status').innerText = 'Gagal konek ke server';
    });

    // Update jam dari device (WIB UTC+7)
    function updateJam() {
      const now = new Date();
      const wib = new Date(now.getTime() + (7 * 60 * 60 * 1000 - now.getTimezoneOffset() * 60 * 1000));
      
      const h = String(wib.getHours()).padStart(2, '0');
      const m = String(wib.getMinutes()).padStart(2, '0');
      const s = String(wib.getSeconds()).padStart(2, '0');
      document.getElementById('jam').innerText = h + ':' + m + ':' + s;

      const hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
      document.getElementById('tanggal').innerText =
        hari[wib.getDay()] + ', ' + wib.getDate() + ' ' + bulan[wib.getMonth()] + ' ' + wib.getFullYear();
    }

    setInterval(updateJam, 1000);
    updateJam();

    function kirimLampu(state) {
      client.publish('smartkos/lampu', state);
      document.getElementById('dot').className = 'dot ' + state.toLowerCase();
      document.getElementById('status-text').innerText = state === 'ON' ? 'Lampu Nyala' : 'Lampu Mati';
    }

    function setAlarm() {
      const waktu = document.getElementById('waktu-alarm').value;
      if(!waktu) return;
      client.publish('smartkos/alarm', waktu);
      alarmAktif = true;
      alarmWaktu = waktu;
      document.getElementById('alarm-dot').className = 'alarm-dot aktif';
      document.getElementById('alarm-status-text').innerText = 'Alarm aktif: ' + waktu + ' WIB';
    }

    function matikanAlarm() {
      client.publish('smartkos/alarm', 'MATIKAN');
      document.getElementById('alarm-dot').className = 'alarm-dot';
      document.getElementById('alarm-status-text').innerText = 'Alarm dimatikan';
    }

    function nonaktifkanAlarm() {
      client.publish('smartkos/alarm', 'OFF');
      alarmAktif = false;
      alarmWaktu = '';
      document.getElementById('alarm-dot').className = 'alarm-dot';
      document.getElementById('alarm-status-text').innerText = 'Alarm tidak aktif';
    }
  </script>
</body>
</html>
