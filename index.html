<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Kos Ropiul</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 16px;
    }
    html {
      scroll-behavior: smooth;
    }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.18);
    }
    .card-title {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .jam-box { text-align: center; padding: 10px 0; }
    .app-title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 14px;
      text-shadow: 0 3px 18px rgba(226, 232, 240, 0.14);
      line-height: 1.1;
    }
    .jam-angka {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 4px;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
    .digit-wrapper {
      display: inline-block;
      overflow: hidden;
      height: 1.2em;
      vertical-align: bottom;
    }
    .digit { display: block; }
    .digit.slide-in {
      animation: slideUp 0.3s ease forwards;
    }
    @keyframes slideUp {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    .sep { margin: 0 2px; line-height: 1.2em; }
    .jam-tanggal {
      font-size: 18px;
      color: #cbd5e1;
      margin-top: 10px;
      line-height: 1.4;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(148, 163, 184, 0.2);
    }
    .status-box {
      background: #0f172a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #64748b; flex-shrink: 0; }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-on { background: #22c55e; color: white; }
    .btn-off { background: #ef4444; color: white; }
    .btn-set { background: #3b82f6; color: white; grid-column: span 2; }
    .btn-nonaktif { background: #475569; color: white; grid-column: span 2; }
    .btn-matikan { background: #f59e0b; color: white; grid-column: span 2; }
    .alarm-input { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
    input[type="time"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-size: 18px;
      text-align: center;
    }
    .alarm-status {
      background: #0f172a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alarm-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; flex-shrink: 0; }
    .alarm-dot.inactive { background: #475569; }
    .alarm-dot.aktif { background: #22c55e; }
    .alarm-dot.bunyi { background: #f59e0b; }
    .footer { font-size: 12px; color: #334155; }
    @media (max-width: 420px) {
      .app-title {
        font-size: 26px;
        letter-spacing: 0.18em;
      }
      .jam-angka {
        font-size: 50px;
      }
      .jam-tanggal {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="app-title">Smart Kos Ropiul</div>

  <!-- JAM -->
  <div class="card">
    <div class="jam-box">
      <div class="jam-angka" id="jam">
        <span class="digit-wrapper"><span class="digit" id="d0">-</span></span>
        <span class="digit-wrapper"><span class="digit" id="d1">-</span></span>
        <span class="sep">:</span>
        <span class="digit-wrapper"><span class="digit" id="d2">-</span></span>
        <span class="digit-wrapper"><span class="digit" id="d3">-</span></span>
        <span class="sep">:</span>
        <span class="digit-wrapper"><span class="digit" id="d4">-</span></span>
        <span class="digit-wrapper"><span class="digit" id="d5">-</span></span>
      </div>
      <div class="jam-tanggal" id="tanggal">--</div>
    </div>
  </div>

  <!-- LAMPU -->
  <div class="card">
    <p class="card-title">💡 Lampu</p>
    <div class="status-box">
      <div class="dot" id="dot-lampu"></div>
      <span id="status-lampu">Lampu Mati</span>
    </div>
    <div class="buttons">
      <button class="btn-on" onclick="kirimLampu('ON')" id="btn-on" disabled>ON</button>
      <button class="btn-off" onclick="kirimLampu('OFF')" id="btn-off" disabled>OFF</button>
    </div>
  </div>

  <!-- KIPAS -->
  <div class="card">
    <p class="card-title">💨 Kipas</p>
    <div class="status-box">
      <div class="dot on" id="dot-kipas"></div>
      <span id="status-kipas">Kipas Nyala</span>
    </div>
    <div class="buttons">
      <button class="btn-on" onclick="kirimKipas('ON')" id="btn-kipas-on" disabled>ON</button>
      <button class="btn-off" onclick="kirimKipas('OFF')" id="btn-kipas-off" disabled>OFF</button>
    </div>
  </div>

  <!-- ALARM -->
  <div class="card">
    <p class="card-title">⏰ Alarm</p>
    <div class="alarm-status">
      <div class="alarm-dot" id="alarm-dot"></div>
      <span id="alarm-status-text">Alarm tidak aktif</span>
    </div>
    <div class="alarm-input">
      <input type="time" id="waktu-alarm" value="07:00">
    </div>
    <div class="buttons">
      <button class="btn-set" onclick="setAlarm()" id="btn-set" disabled>Set Alarm</button>
      <button class="btn-matikan" onclick="matikanAlarm()" id="btn-matikan" disabled>Matikan Alarm</button>
      <button class="btn-nonaktif" onclick="nonaktifkanAlarm()" id="btn-nonaktif" disabled>Nonaktifkan Alarm</button>
    </div>
  </div>

  <p class="footer">Smart Kos &copy; 2026</p>

  <script>
    // Reset localStorage kipas jika versi baru
    if(localStorage.getItem('versi') !== '2') {
      localStorage.removeItem('statusKipas');
      localStorage.setItem('versi', '2');
    }

    const broker = 'wss://276d9e54084e4a99b7b863492b06212b.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
      username: 'Rafifirdaus',
      password: '@Gresik123',
      clientId: 'webClient_' + Math.random().toString(16).substr(2, 8)
    };

    const client = mqtt.connect(broker, options);
    let alarmAktif = false;
    let alarmWaktu = '';
    let prevDigits = ['','','','','',''];

    client.on('connect', () => {
      ['btn-on','btn-off','btn-kipas-on','btn-kipas-off',
       'btn-set','btn-matikan','btn-nonaktif'].forEach(id => {
        document.getElementById(id).disabled = false;
      });
      client.subscribe('smartkos/status');
    });

    client.on('error', () => {
      console.log('Gagal konek ke server');
    });

    client.on('message', (topic, message) => {
      const pesan = message.toString();
      if(topic === 'smartkos/status' && pesan === 'ALARM_BUNYI') {
        setKipasStatus('OFF', true);
      }
    });

    function updateJam() {
      const now = new Date();
      const jamFormatter = new Intl.DateTimeFormat('id-ID', {
        timeZone: 'Asia/Jakarta',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
      const tanggalFormatter = new Intl.DateTimeFormat('id-ID', {
        timeZone: 'Asia/Jakarta',
        weekday: 'long', day: 'numeric', month: 'short', year: 'numeric'
      });

      const jamStr = jamFormatter.format(now).replace(/\./g, ':').replace(/:/g, '');
      const digits = jamStr.split('');

      digits.forEach((digit, i) => {
        if(digit !== prevDigits[i]) {
          const el = document.getElementById('d' + i);
          el.classList.remove('slide-in');
          void el.offsetWidth;
          el.textContent = digit;
          el.classList.add('slide-in');
          prevDigits[i] = digit;
        }
      });

      document.getElementById('tanggal').innerText = tanggalFormatter.format(now);
    }

    function setKipasStatus(state, save = false) {
      const normalized = state === 'ON' ? 'ON' : 'OFF';
      document.getElementById('dot-kipas').className = 'dot ' + normalized.toLowerCase();
      document.getElementById('status-kipas').innerText = normalized === 'ON' ? 'Kipas Nyala' : 'Kipas Mati';
      if (save) {
        localStorage.setItem('statusKipas', normalized);
      }
    }

    setInterval(updateJam, 1000);
    updateJam();

    // Load status lampu dari localStorage
    const savedLampu = localStorage.getItem('statusLampu');
    if(savedLampu) {
      document.getElementById('dot-lampu').className = 'dot ' + savedLampu.toLowerCase();
      document.getElementById('status-lampu').innerText = savedLampu === 'ON' ? 'Lampu Nyala' : 'Lampu Mati';
    }

    // Load status kipas dari localStorage
    if(localStorage.getItem('statusKipas') === null) {
      localStorage.setItem('statusKipas', 'ON');
    }
    const savedKipas = localStorage.getItem('statusKipas');
    setKipasStatus(savedKipas, false);

    // Load alarm terakhir dari localStorage
    const savedAlarm = localStorage.getItem('alarmWaktu');
    if(savedAlarm) {
      document.getElementById('waktu-alarm').value = savedAlarm;
      document.getElementById('alarm-dot').className = 'alarm-dot aktif';
      document.getElementById('alarm-status-text').innerText = 'Alarm aktif: ' + savedAlarm + ' WIB';
      alarmAktif = true;
      alarmWaktu = savedAlarm;
    }

    function kirimLampu(state) {
      client.publish('smartkos/lampu', state);
      localStorage.setItem('statusLampu', state);
      document.getElementById('dot-lampu').className = 'dot ' + state.toLowerCase();
      document.getElementById('status-lampu').innerText = state === 'ON' ? 'Lampu Nyala' : 'Lampu Mati';
    }

    function kirimKipas(state) {
      client.publish('smartkos/kipas', state);
      setKipasStatus(state, true);
    }

    function setAlarm() {
      const waktu = document.getElementById('waktu-alarm').value;
      if(!waktu) return;
      client.publish('smartkos/alarm', waktu);
      alarmAktif = true;
      alarmWaktu = waktu;
      localStorage.setItem('alarmWaktu', waktu);
      document.getElementById('alarm-dot').className = 'alarm-dot aktif';
      document.getElementById('alarm-status-text').innerText = 'Alarm aktif: ' + waktu + ' WIB';
    }

    function matikanAlarm() {
      client.publish('smartkos/alarm', 'OFF');
      client.publish('smartkos/kipas', 'OFF');
      alarmAktif = false;
      alarmWaktu = '';
      localStorage.removeItem('alarmWaktu');
      setKipasStatus('OFF', true);
      document.getElementById('alarm-dot').className = 'alarm-dot bunyi';
      document.getElementById('alarm-status-text').innerText = 'Buzzer dimatikan, alarm masih aktif';
    }

    function nonaktifkanAlarm() {
      client.publish('smartkos/alarm', 'OFF');
      alarmAktif = false;
      alarmWaktu = '';
      localStorage.removeItem('alarmWaktu');
      document.getElementById('alarm-dot').className = 'alarm-dot inactive';
      document.getElementById('alarm-status-text').innerText = 'Alarm tidak aktif';
    }
  </script>
</body>
</html>
